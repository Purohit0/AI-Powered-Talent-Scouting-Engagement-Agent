<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Talent Scout - Smart Candidate Engagement</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card h2 .icon {
            font-size: 1.5rem;
        }
        
        textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .results {
            display: none;
        }
        
        .results.visible {
            display: block;
        }
        
        .jd-summary {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .jd-summary h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .jd-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .jd-tag {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
        }
        
        .candidate-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .candidate-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        
        .candidate-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .candidate-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
        }
        
        .candidate-role {
            color: #666;
            font-size: 0.9rem;
            margin-top: 3px;
        }
        
        .rank-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .scores {
            display: flex;
            gap: 15px;
            margin: 15px 0;
        }
        
        .score-box {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        
        .score-box.match {
            background: #e8f5e9;
        }
        
        .score-box.interest {
            background: #fff3e0;
        }
        
        .score-box.combined {
            background: #e3f2fd;
        }
        
        .score-value {
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .score-box.match .score-value {
            color: #071608;
        }
        
        .score-box.interest .score-value {
            color: #f57c00;
        }
        
        .score-box.combined .score-value {
            color: #1565c0;
        }
        
        .score-label {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-badge.hot {
            background: #ffebee;
            color: #c62828;
        }
        
        .status-badge.warm {
            background: #fff3e0;
            color: #f57c00;
        }
        
        .status-badge.cold {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .explanation {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #555;
            margin: 15px 0;
            border-left: 3px solid #667eea;
        }
        
        .conversation {
            background: #f0f4f8;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
        
        .conversation h4 {
            color: #333;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }
        
        .message {
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        
        .message.outreach {
            background: #e8f5e9;
            border-left: 3px solid #4caf50;
        }
        
        .message.response {
            background: #e3f2fd;
            border-left: 3px solid #2196f3;
        }
        
        .message-label {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 5px;
        }
        
        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }
        
        .skill-tag {
            background: #f0f0f0;
            color: #555;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
        }
        
        .matched-skill {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .missing-skill {
            background: #ffebee;
            color: #c62828;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn-small {
            padding: 8px 20px;
            font-size: 14px;
        }
        
        .steps-indicator {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .step {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #999;
            font-size: 0.9rem;
        }
        
        .step.active {
            color: #667eea;
            font-weight: 600;
        }
        
        .step.completed {
            color: #4caf50;
        }
        
        .step-number {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }
        
        .step.active .step-number {
            background: #667eea;
            color: white;
        }
        
        .step.completed .step-number {
            background: #4caf50;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI Talent Scout</h1>
            <p>Smart Candidate Discovery & Engagement</p>
        </header>
        
        <div class="steps-indicator">
            <div class="step active" id="step1">
                <span class="step-number">1</span>
                <span>Input JD</span>
            </div>
            <div class="step" id="step2">
                <span class="step-number">2</span>
                <span>Match Candidates</span>
            </div>
            <div class="step" id="step3">
                <span class="step-number">3</span>
                <span>Engage & Rank</span>
            </div>
        </div>
        
        <div class="card">
            <h2><span class="icon">📋</span> Paste Job Description</h2>
            <textarea id="jdInput" placeholder="Paste your job description here...

Example:
Software Engineer
Location: Bangalore
Experience: 3-5 years

Required Skills:
- Python, Django, React
- AWS, Docker
- SQL, MongoDB

Responsibilities:
- Build scalable web applications
- Collaborate with cross-functional teams
- Mentor junior developers

Education: B.Tech or equivalent"></textarea>
            <button class="btn" onclick="processJD()">🔍 Find & Engage Candidates</button>
        </div>
        
        <div id="loading" class="card" style="display: none;">
            <div class="loading">
                <div class="spinner"></div>
                <p>Analyzing job description and matching candidates...</p>
            </div>
        </div>
        
        <div id="results" class="results">
            <div class="card">
                <h2><span class="icon">📊</span> JD Analysis</h2>
                <div class="jd-summary" id="jdSummary"></div>
            </div>
            
            <div class="card">
                <h2><span class="icon">🏆</span> Ranked Candidate Shortlist</h2>
                <div id="candidatesList"></div>
            </div>
        </div>
    </div>
    
    <script>
        async function processJD() {
            const jdText = document.getElementById('jdInput').value.trim();
            
            if (!jdText) {
                alert('Please enter a job description');
                return;
            }
            
            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').classList.remove('visible');
            
            // Update steps
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step1').classList.add('completed');
            document.getElementById('step2').classList.add('active');
            
            try {
                const response = await fetch('/api/full-process', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ jd_text: jdText })
                });
                
                const data = await response.json();
                
                // Display JD summary
                displayJDAnalysis(data.parsed_jd);
                
                // Display candidates
                displayCandidates(data.ranked_candidates);
                
                // Update steps
                document.getElementById('step2').classList.remove('active');
                document.getElementById('step2').classList.add('completed');
                document.getElementById('step3').classList.add('active');
                
                // Show results
                document.getElementById('loading').style.display = 'none';
                document.getElementById('results').classList.add('visible');
                
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred. Please try again.');
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        function displayJDAnalysis(parsed) {
            const summary = document.getElementById('jdSummary');
            
            let html = `
                <h3>${parsed.title || 'Job Position'}</h3>
                <p><strong>Location:</strong> ${parsed.location || 'Not specified'}</p>
                <p><strong>Experience Required:</strong> ${parsed.experience_required ? parsed.experience_required + ' years' : 'Not specified'}</p>
                <p><strong>Education:</strong> ${parsed.education.join(', ')}</p>
                <div class="jd-tags">
                    ${parsed.skills.map(skill => `<span class="jd-tag">${skill}</span>`).join('')}
                </div>
            `;
            
            summary.innerHTML = html;
        }
        
        function displayCandidates(candidates) {
            const list = document.getElementById('candidatesList');
            
            let html = '';
            
            candidates.forEach((candidate, index) => {
                const rank = index + 1;
                const statusClass = candidate.engagement_status.toLowerCase();
                
                html += `
                    <div class="candidate-card">
                        <div class="candidate-header">
                            <div>
                                <div class="candidate-name">${candidate.name}</div>
                                <div class="candidate-role">${candidate.current_role} at ${candidate.company}</div>
                                <div style="margin-top: 5px; font-size: 0.85rem; color: #666;">
                                    📍 ${candidate.location} | 💼 ${candidate.experience_years} years | 📧 ${candidate.email}
                                </div>
                            </div>
                            <div class="rank-badge">#${rank}</div>
                        </div>
                        
                        <div class="scores">
                            <div class="score-box match">
                                <div class="score-value">${candidate.match_score}%</div>
                                <div class="score-label">Match Score</div>
                            </div>
                            <div class="score-box interest">
                                <div class="score-value">${candidate.interest_score}%</div>
                                <div class="score-label">Interest Score</div>
                            </div>
                            <div class="score-box combined">
                                <div class="score-value">${candidate.combined_score}%</div>
                                <div class="score-label">Combined</div>
                            </div>
                        </div>
                        
                        <div>
                            <span class="status-badge ${statusClass}">${candidate.engagement_status}</span>
                        </div>
                        
                        <div class="explanation">
                            ${candidate.explanation}
                        </div>
                        
                        <div class="skills-list">
                            ${candidate.matched_skills.map(skill => `<span class="skill-tag matched-skill">✓ ${skill}</span>`).join('')}
                            ${candidate.missing_skills.slice(0, 3).map(skill => `<span class="skill-tag missing-skill">✗ ${skill}</span>`).join('')}
                        </div>
                        
                        <div class="conversation">
                            <h4>💬 Engagement Conversation</h4>
                            <div class="message outreach">
                                <div class="message-label">Recruiter Message:</div>
                                ${candidate.conversation.initial_message}
                            </div>
                            <div class="message response">
                                <div class="message-label">Candidate Response:</div>
                                ${candidate.candidate_response}
                            </div>
                        </div>
                    </div>
                `;
            });
            
            list.innerHTML = html;
        }
    </script>
</body>
</html>
